name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [server, client]
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build client
        if: matrix.project == 'client'
        run: npm run build

      - name: Import server app
        if: matrix.project == 'server'
        run: node --input-type=module -e "import('./src/app.js').then(() => console.log('server-import-ok'))"
